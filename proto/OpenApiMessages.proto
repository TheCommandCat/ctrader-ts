    required int64 ctidTraderAccountId = 2;
}

// Margin call

message ProtoOAMarginCallListReq {
    optional ProtoOAPayloadType payloadType = 1 [default = PROTO_OA_MARGIN_CALL_LIST_REQ];
    required int64 ctidTraderAccountId = 2;
}

message ProtoOAMarginCallListRes {
