}

message ProtoOAOrderDetailsRes {
    optional ProtoOAPayloadType payloadType = 1 [default = PROTO_OA_ORDER_DETAILS_RES];
    required int64 ctidTraderAccountId = 2;
    required ProtoOAOrder order = 3;
