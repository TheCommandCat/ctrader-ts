message ProtoOAGetDynamicLeverageByIDReq {
    optional ProtoOAPayloadType payloadType = 1 [default = PROTO_OA_GET_DYNAMIC_LEVERAGE_REQ];
    required int64 ctidTraderAccountId = 2;
    required int64 leverageId = 3;
